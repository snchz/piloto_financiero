# Version: 1.0.4
services:
  piloto-financiero:
    build:
      context: .
      args:
        - BUILD_VERSION=1.0.4
    container_name: piloto-financiero
    ports:
      - "5000:5000"
    environment:
      - DEBUG_LOG=false  # Habilitar/deshabilitar logs de debug (true/false)
      - TZ=Europe/Madrid  # Zona horaria (ajustar si es diferente)
    restart: unless-stopped