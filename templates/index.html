<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piloto Financiero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f1115;
            --bg-surface: #181a20;
            --bg-surface-hover: #22252d;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.05);
        }
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }
        .glass-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-primary);
            margin-bottom: 0;
        }
        .table th {
            border-bottom-color: var(--border-color);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table td {
            border-bottom-color: var(--border-color);
            vertical-align: middle;
        }
        .table tbody tr {
            transition: background-color 0.2s;
        }
        .table tbody tr:hover {
            background-color: var(--bg-surface-hover);
        }
        .form-control {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .form-control:focus {
            background-color: rgba(255,255,255,0.05);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
            color: var(--text-primary);
        }
        .btn-primary {
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
        .badge-status {
            font-weight: 500;
            padding: 0.35em 0.65em;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .badge-active {
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }
        .badge-alert {
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            transition: color 0.2s;
            padding: 4px;
        }
        .action-btn:hover {
            color: var(--text-primary);
        }
        .action-btn.delete:hover {
            color: #f87171;
        }
        /* Layout adjustments */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .version-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 99px;
        }
        .alerts-feed {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }
        .alerts-feed::-webkit-scrollbar {
            width: 4px;
        }
        .alerts-feed::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }
        .alert-item {
            background: rgba(245, 158, 11, 0.05);
            border-left: 3px solid #f59e0b;
            color: #fbbf24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 0.875rem;
        }
        
        /* Debug panel */
        .debug-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-surface);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.2s;
        }
        .debug-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-surface-hover);
        }
        .debug-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 450px;
            max-height: 400px;
            background: rgba(15, 17, 21, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .debug-logs {
            max-height: 320px;
            overflow-y: auto;
        }
        .log-entry { margin: 4px 0; }
        .log-timestamp { color: #6b7280; margin-right: 8px; }
        .log-level-ERROR { color: #ef4444; }
        .log-level-WARNING { color: #f59e0b; }
        .log-level-INFO { color: #60a5fa; }
        
        /* Fullscreen layout */
        .container {
            flex: 1;
            overflow: auto;
            padding: 1.5rem;
            max-width: 100%;
        }
        
        .last-update {
            display: inline-block;
            padding: 0.35em 0.65em;
            border-radius: 6px;
            font-size: 0.8rem;
            background: rgba(100, 165, 250, 0.1);
            color: #64a5fa;
            margin-left: 1rem;
        }
        
        main {
            height: 100%;
        }
        
        .row.g-4 {
            height: 100%;
        }
        
        .col-xl-8, .col-xl-4 {
            display: flex;
            flex-direction: column;
        }
        
        .col-xl-8 > .glass-panel:last-child {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .table-responsive {
            flex: 1;
            overflow: auto;
        }
        
        .col-xl-4 > .glass-panel {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .col-xl-4 > .glass-panel > div {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <header class="page-header">
            <div>
                <span class="brand">✨ Piloto Financiero</span>
                <span class="last-update">Última actualización: <span id="last-update-time">--:--:--</span></span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button class="action-btn" onclick="abrirConfig()" title="Configuración" style="font-size: 1.25rem;">⚙️</button>
                <div class="version-badge">v<span id="version">{{ version }}</span></div>
            </div>
        </header>

        <main class="row g-4">
            <div class="col-xl-8">
                <!-- Add Form -->
                <div class="glass-panel p-4 mb-4">
                    <form id="add-form" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-secondary small mb-1">Activo (Ticker o ISIN)</label>
                            <input type="text" id="ticker" class="form-control" placeholder="Ej. AAPL, ES0105065009" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-secondary small mb-1">Precio Objetivo</label>
                            <input type="number" step="0.01" id="target" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-secondary small mb-1">Alerta Variación Diaria (%)</label>
                            <input type="number" step="0.1" id="target_pct" class="form-control" placeholder="5.0" min="0">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100" id="submit-btn">
                                Añadir Alerta
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Table -->
                <div class="glass-panel overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-borderless align-middle">
                            <thead class="bg-dark bg-opacity-25">
                                <tr>
                                    <th class="ps-4">Activo</th>
                                    <th>Moneda</th>
                                    <th class="text-end">Actual</th>
                                    <th class="text-end">Variación</th>
                                    <th class="text-end">Objetivo</th>
                                    <th class="text-center">Última Act.</th>
                                    <th class="text-center">Estado</th>
                                    <th class="pe-4 text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="monitors-table">
                                <tr><td colspan="8" class="text-center py-4 text-secondary"><div class="spinner-border spinner-border-sm"></div> Conectando con servidor...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-xl-4">
                <div class="glass-panel p-4 h-100">
                    <h5 class="mb-4 fs-6 text-uppercase text-secondary" style="letter-spacing: 0.05em">Actividad Reciente</h5>
                    <div id="alerts-feed" class="alerts-feed">
                        <div class="text-secondary small">Sin actividad reciente</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Config Modal -->
    <div class="modal fade" id="configModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content glass-panel" style="background: var(--bg-surface);">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title">⚙️ Configuración General</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="config-form">
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Telegram Bot Token</label>
                            <input type="password" id="cfg-telegram-token" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Telegram Chat ID</label>
                            <input type="text" id="cfg-telegram-chat-id" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Intervalo de Refresco (minutos)</label>
                            <input type="number" id="cfg-refresh-interval" class="form-control" min="1">
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="cfg-check-market-hours">
                            <label class="form-check-label text-secondary small">Respetar horario de mercado</label>
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" id="cfg-debug-ui">
                            <label class="form-check-label text-secondary small">Modo Debug</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Configuración</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Monitor Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content glass-panel" style="background: var(--bg-surface);">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title">✏️ Editar Alerta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form">
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Precio Objetivo</label>
                            <input type="number" step="0.01" id="edit-target" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Alerta Variación Diaria (%)</label>
                            <input type="number" step="0.1" id="edit-target-pct" class="form-control" min="0">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Debug Toggle -->
    <button class="debug-toggle" onclick="toggleDebug()" title="Ver Logs del Sistema">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 17l6-6-6-6M12 19h8"></path></svg>
    </button>

    <div class="debug-panel" id="debugPanel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-secondary small text-uppercase fw-bold">System Logs</span>
            <div>
                <button class="action-btn" onclick="copyLogs()" title="Copiar">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V4a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
                <button class="action-btn" onclick="clearLogs()" title="Limpiar">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>
        <div class="debug-logs" id="debugLogs"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = {
            async fetch(url, options = {}) {
                const res = await fetch(url, options);
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.error || 'Error de comunicación con el servidor');
                }
                return res.json();
            }
        };

        const UI = {
            version: '{{ version }}',
            
            updateLastRefreshTime() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('es-ES');
                const dateStr = now.toLocaleDateString('es-ES');
                const timestamp = `${dateStr} ${timeStr}`;
                document.getElementById('last-update-time').textContent = timeStr;
                localStorage.setItem('last_price_update', timestamp);
            },
            
            loadLastRefreshTime() {
                const timestamp = localStorage.getItem('last_price_update');
                if (timestamp) {
                    const parts = timestamp.split(' ');
                    const timeStr = parts.slice(1).join(' ');
                    document.getElementById('last-update-time').textContent = timeStr;
                } else {
                    document.getElementById('last-update-time').textContent = '--:--:--';
                }
            },
            
            showToast(message, type = 'success') {
                const container = document.querySelector('.toast-container');
                const id = 'toast-' + Date.now();
                const icon = type === 'success' ? '✓' : '⚠️';
                const bg = type === 'success' ? 'text-bg-success' : 'text-bg-danger';
                
                const toastHtml = `
                    <div id="${id}" class="toast align-items-center ${bg} border-0 mb-2 shadow" role="alert" aria-live="assertive" aria-atomic="true">
                        <div class="d-flex">
                            <div class="toast-body">
                                <strong>${icon}</strong> ${message}
                            </div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', toastHtml);
                const toastEl = document.getElementById(id);
                const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
                toast.show();
                toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
            },

            renderTable(monitores) {
                const entries = Object.entries(monitores);
                console.log(`📋 Renderizando tabla con ${entries.length} monitores`);
                if (entries.length === 0) {
                    document.getElementById('monitors-table').innerHTML = '<tr><td colspan="8" class="text-center py-4 text-secondary">No hay alertas configuradas</td></tr>';
                    return;
                }

                const formatCurrency = (val, currency) => {
                    if (val == null) return '...';
                    try {
                        const curr = (currency && currency !== '-') ? currency.toUpperCase() : 'USD';
                        return new Intl.NumberFormat('es-ES', { style: 'currency', currency: curr }).format(val);
                    } catch (e) {
                        return val.toFixed(2) + ' ' + (currency || '');
                    }
                };

                const html = entries.map(([id, m]) => {
                    // Calcular variación porcentual
                    const variacion = m.current && m.previous_close ? ((m.current - m.previous_close) / m.previous_close * 100) : 0;
                    const variacionClass = variacion >= 0 ? 'text-success' : 'text-danger';
                    const variacionSign = variacion >= 0 ? '+' : '';
                    
                    console.log(`  ⏰ ${m.ticker}: current_price_time = "${m.current_price_time}"`);
                    
                    return `
                    <tr>
                        <td class="ps-4">
                            <div class="fw-semibold text-white">
                                ${m.ticker}
                                ${m.target_pct > 0 ? '<span class="ms-1" title="Alerta de volatilidad configurada">📈</span>' : ''}
                            </div>
                            <div class="text-secondary" style="font-size: 0.75rem">${m.name || 'Desconocido'}</div>
                        </td>
                        <td><span class="badge bg-dark border border-secondary border-opacity-25">${m.currency || '-'}</span></td>
                        <td class="text-end font-monospace fs-6">
                            ${formatCurrency(m.current, m.currency)}
                        </td>
                        <td class="text-end font-monospace fs-6 ${variacionClass}">${variacion ? `${variacionSign}${variacion.toFixed(1)}%` : '-'}</td>
                        <td class="text-end font-monospace fs-6 text-white">${formatCurrency(m.target, m.currency)}</td>
                        <td class="text-center font-monospace text-secondary" style="font-size: 0.85rem;">
                            ${m.current_price_time || 'N/A'}
                        </td>
                        <td class="text-center">
                            <span class="badge-status ${m.triggered ? 'badge-alert' : 'badge-active'}">
                                ${m.triggered ? 'ALERTA' : 'Vigilando'}
                            </span>
                        </td>
                        <td class="pe-4 text-end">
                            <button onclick="openEditModal('${id}', ${m.target}, ${m.target_pct || 0})" class="action-btn me-1" title="Editar objetivo">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="handleDelete('${id}')" class="action-btn delete" title="Eliminar">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>
                `}).join('');
                document.getElementById('monitors-table').innerHTML = html;
            },

            renderFeed(alertas) {
                if (alertas.length === 0) return;
                const html = alertas.map(a => `
                    <div class="alert-item d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="opacity-75 font-monospace" style="font-size:0.75rem">${a.time}</span>
                        </div>
                        <div>${a.msg}</div>
                    </div>
                `).join('');
                document.getElementById('alerts-feed').innerHTML = html;
            },

            checkVersion(newVersion) {
                if (this.version !== newVersion) {
                    this.version = newVersion;
                    document.getElementById('version').textContent = newVersion;
                    this.showToast(`Actualizado a v${newVersion}`, 'success');
                }
            }
        };

        let configModal = null;
        let editModal = null;
        document.addEventListener('DOMContentLoaded', () => {
            configModal = new bootstrap.Modal(document.getElementById('configModal'));
            editModal = new bootstrap.Modal(document.getElementById('editModal'));
            UI.loadLastRefreshTime();
        });

        window.abrirConfig = async () => {
            try {
                const config = await API.fetch('/api/config');
                document.getElementById('cfg-telegram-token').value = config.telegram_token;
                document.getElementById('cfg-telegram-chat-id').value = config.telegram_chat_id;
                document.getElementById('cfg-refresh-interval').value = config.refresh_interval;
                document.getElementById('cfg-check-market-hours').checked = config.check_market_hours;
                document.getElementById('cfg-debug-ui').checked = config.debug_ui;
                configModal.show();
            } catch (err) {
                UI.showToast('Error cargando configuración', 'error');
            }
        };

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                telegram_token: document.getElementById('cfg-telegram-token').value,
                telegram_chat_id: document.getElementById('cfg-telegram-chat-id').value,
                refresh_interval: parseInt(document.getElementById('cfg-refresh-interval').value) || 30,
                check_market_hours: document.getElementById('cfg-check-market-hours').checked,
                debug_ui: document.getElementById('cfg-debug-ui').checked
            };
            
            try {
                await API.fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                configModal.hide();
                UI.showToast('Configuración guardada correctamente');
            } catch (err) {
                UI.showToast('Error guardando configuración', 'error');
            }
        });

        // DOM Events
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const ticker = document.getElementById('ticker').value;
            const target = document.getElementById('target').value;
            const target_pct = document.getElementById('target_pct').value;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
            
            try {
                await API.fetch('/api/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ticker, target, target_pct: target_pct ? parseFloat(target_pct) : 0 })
                });
                document.getElementById('add-form').reset();
                UI.showToast('Alerta añadida correctamente');
            } catch (err) {
                UI.showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Añadir Alerta';
            }
        });

        window.handleDelete = async (id) => {
            if (!confirm('¿Seguro que deseas eliminar esta alerta?')) return;
            try {
                await API.fetch(`/api/delete/${id}`, { method: 'DELETE' });
                UI.showToast('Alerta eliminada');
            } catch (err) {
                UI.showToast('No se pudo eliminar', 'error');
            }
        };
        let currentEditId = null;

        const editForm = document.getElementById('edit-form');
        const editTargetInput = document.getElementById('edit-target');
        const editPctInput = document.getElementById('edit-target-pct');

        window.openEditModal = (id, target, targetPct) => {
            currentEditId = id;
            editTargetInput.value = target;
            editPctInput.value = targetPct || '';
            editModal.show();
        };

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentEditId) return;

            const target = parseFloat(editTargetInput.value.replace(',', '.'));
            const targetPct = parseFloat(editPctInput.value.replace(',', '.')) || 0;

            if (isNaN(target) || target <= 0) return UI.showToast('Precio objetivo inválido', 'error');
            if (isNaN(targetPct) || targetPct < 0) return UI.showToast('Porcentaje inválido', 'error');

            try {
                await API.fetch(`/api/edit/${currentEditId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ target, target_pct: targetPct })
                });
                editModal.hide();
                UI.showToast('Objetivo actualizado con éxito');
            } catch (err) {
                UI.showToast('No se pudo actualizar el objetivo', 'error');
            }
        });

        // --- SSE implementation ---
        const evtSource = new EventSource('/api/stream');
        evtSource.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                console.log("🔔 SSE recibido - Datos:", data);
                if (data.monitores && Object.keys(data.monitores).length > 0) {
                    const firstId = Object.keys(data.monitores)[0];
                    const firstMonitor = data.monitores[firstId];
                    console.log(`📊 Primer monitor: ${firstMonitor.ticker}, timestamp: ${firstMonitor.current_price_time}`);
                }
                UI.checkVersion(data.version);
                UI.updateLastRefreshTime();
                UI.renderTable(data.monitores);
                UI.renderFeed(data.alertas);
            } catch (err) {
                console.error("SSE parsing error:", err);
            }
        };
        evtSource.onerror = function(err) {
            console.error("SSE connection error:", err);
        };

        let logInterval = null;

        async function syncLogs() {
            try {
                const data = await API.fetch('/api/logs');
                document.getElementById('debugLogs').innerHTML = data.logs.map(l => 
                    `<div class="log-entry font-monospace">
                        <span class="log-timestamp">${l.timestamp}</span>
                        <span class="log-level-${l.level}">[${l.level}]</span> 
                        <span class="text-light">${l.message}</span>
                    </div>`
                ).join('');
            } catch (err) {}
        }

        window.toggleDebug = () => {
            const panel = document.getElementById('debugPanel');
            const isHidden = panel.style.display === 'none' || panel.style.display === '';
            panel.style.display = isHidden ? 'block' : 'none';
            if (isHidden) {
                syncLogs();
                logInterval = setInterval(syncLogs, 2000);
            } else if (logInterval) {
                clearInterval(logInterval);
            }
        };

        window.clearLogs = async () => {
            try {
                await API.fetch('/api/logs', { method: 'DELETE' });
                document.getElementById('debugLogs').innerHTML = '';
            } catch (e) {}
        };

        window.copyLogs = () => {
            const logsElement = document.getElementById('debugLogs');
            const logsText = logsElement.innerText;
            
            if (!logsText.trim()) {
                UI.showToast('No hay logs para copiar', 'error');
                return;
            }
            
            navigator.clipboard.writeText(logsText).then(() => {
                UI.showToast('Logs copiados al portapapeles');
            }).catch(() => {
                UI.showToast('Error al copiar logs', 'error');
            });
        };
    </script>
</body>
</html>
